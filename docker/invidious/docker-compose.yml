services:
  invidious:
    image: quay.io/invidious/invidious:latest
    container_name: invidious
    restart: unless-stopped

    ports:
      - 3000:3000"

    environment:
      INVIDIOUS_CONFIG: |
        db:
          dbname: [Database Name]
          user: [Database User]
          password: [Database Pass]
          host: invidious-db
          port: 5432

        check_tables: true

        invidious_companion:
          - private_url: "http://companion:8282/companion"

        invidious_companion_key: [Key]
        hmac_key: [Key]

        statistics_enabled: false

    healthcheck:
      test:
        - CMD-SHELL
        - wget -nv --tries=1 --spider http://127.0.0.1:3000/api/v1/stats || exit 1
      interval: 30s
      timeout: 5s
      retries: 2

    logging:
      options:
        max-size: "1G"
        max-file: "4"

    depends_on:
      invidious-db:
        condition: service_healthy
      companion:
        condition: service_started

    networks:
      - vpn_net

  companion:
    image: quay.io/invidious/invidious-companion:latest
    container_name: invidious-companion
    restart: unless-stopped

    environment:
      SERVER_SECRET_KEY: ${INVIDIOUS_COMPANION_KEY}

    logging:
      options:
        max-size: "1G"
        max-file: "4"

    cap_drop:
      - ALL

    read_only: true

    volumes:
      - companioncache:/var/tmp/youtubei.js:rw

    security_opt:
      - no-new-privileges:true

    networks:
      - vpn_net

volumes:
  companioncache:

networks:
  vpn_net:
    external: true